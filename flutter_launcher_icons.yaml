# Roomi Arts app icon. Master: assets/icon/roomi_icon.png (1024x1024).
# Regenerate: flutter pub run flutter_launcher_icons
# (kept out of pubspec.yaml so the pubspec JSON schema stays clean.)
flutter_icons:
  image_path: "assets/icon/roomi_icon.png"
  macos:
    generate: true
    image_path: "assets/icon/roomi_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/roomi_icon.png"
    icon_size: 256
